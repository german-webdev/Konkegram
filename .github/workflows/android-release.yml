name: Android Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build release APKs
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      ORG_GRADLE_PROJECT_RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
      ORG_GRADLE_PROJECT_RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
      ORG_GRADLE_PROJECT_RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
      ORG_GRADLE_PROJECT_RELEASE_STORE_FILE: ../TMessagesProj/config/konkegram-release.keystore
      NATIVE_COMPILER_LAUNCHER: ccache
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_COMPILERCHECK: string:android-ndk-27.2.12479018
      CCACHE_MAXSIZE: 4G
      CCACHE_COMPRESS: "true"
      CCACHE_COMPRESSLEVEL: "1"

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic
          cache-read-only: ${{ github.ref != format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android build tools
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;27.2.12479018" "cmake;3.22.1"

      - name: Install native compiler cache
        run: |
          if ! command -v ccache >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install --yes ccache
          fi
          ccache --version

      - name: Restore native compiler cache
        id: ccache-restore
        uses: actions/cache/restore@v4
        with:
          path: .ccache
          key: ccache-v1-${{ runner.os }}-ndk-27.2.12479018-cmake-3.22.1-${{ github.sha }}
          restore-keys: |
            ccache-v1-${{ runner.os }}-ndk-27.2.12479018-cmake-3.22.1-

      - name: Configure native compiler cache
        run: |
          ccache --set-config=max_size="$CCACHE_MAXSIZE"
          ccache --set-config=compression=true
          ccache --set-config=compression_level="$CCACHE_COMPRESSLEVEL"
          ccache --zero-stats
          ccache --show-config

      - name: Restore release credentials
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          for value in \
            RELEASE_KEYSTORE_BASE64 \
            GOOGLE_SERVICES_JSON_BASE64 \
            ORG_GRADLE_PROJECT_RELEASE_STORE_PASSWORD \
            ORG_GRADLE_PROJECT_RELEASE_KEY_ALIAS \
            ORG_GRADLE_PROJECT_RELEASE_KEY_PASSWORD; do
            if [ -z "${!value}" ]; then
              echo "::error::Required repository secret is missing: ${value#ORG_GRADLE_PROJECT_}"
              exit 1
            fi
          done

          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > TMessagesProj/config/konkegram-release.keystore
          printf '%s' "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > TMessagesProj/google-services.json
          cp TMessagesProj/google-services.json TMessagesProj_App/google-services.json

      - name: Build signed release
        run: |
          chmod +x gradlew
          ./gradlew \
            :TMessagesProj_App:assembleAfatRelease \
            :TMessagesProj_App:assembleArm64Release \
            :TMessagesProj_App:assembleArmv7Release \
            --stacktrace \
            --build-cache \
            --no-daemon

      - name: Report native compiler cache
        if: always()
        run: ccache --show-stats

      - name: Save native compiler cache
        if: success() && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && steps.ccache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .ccache
          key: ccache-v1-${{ runner.os }}-ndk-27.2.12479018-cmake-3.22.1-${{ github.sha }}

      - name: Prepare release files
        shell: bash
        run: |
          version_name=$(sed -n 's/^APP_VERSION_NAME=//p' gradle.properties)
          universal_apk=$(find TMessagesProj_App/build/outputs/apk/afat/release -type f -name '*.apk' -print -quit)
          arm64_apk=$(find TMessagesProj_App/build/outputs/apk/arm64/release -type f -name '*.apk' -print -quit)
          armv7_apk=$(find TMessagesProj_App/build/outputs/apk/armv7/release -type f -name '*.apk' -print -quit)

          if [ -z "$version_name" ] || [ -z "$universal_apk" ] || [ -z "$arm64_apk" ] || [ -z "$armv7_apk" ]; then
            echo "::error::One or more release APKs were not produced"
            exit 1
          fi

          if [ "$GITHUB_REF_TYPE" = "tag" ] && [ "$GITHUB_REF_NAME" != "v$version_name" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match APP_VERSION_NAME=$version_name"
            exit 1
          fi

          mkdir -p release
          arm64_name="konkegram-v${version_name}-release-arm64-v8a.apk"
          armv7_name="konkegram-v${version_name}-release-armeabi-v7a.apk"
          universal_name="konkegram-v${version_name}-release-universal.apk"
          cp "$arm64_apk" "release/$arm64_name"
          cp "$armv7_apk" "release/$armv7_name"
          cp "$universal_apk" "release/$universal_name"

          release_tag="v${version_name}"
          release_base_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${release_tag}"
          arm64_sha256=$(sha256sum "release/$arm64_name" | cut -d ' ' -f 1)
          armv7_sha256=$(sha256sum "release/$armv7_name" | cut -d ' ' -f 1)
          universal_sha256=$(sha256sum "release/$universal_name" | cut -d ' ' -f 1)
          arm64_size=$(stat -c '%s' "release/$arm64_name")
          armv7_size=$(stat -c '%s' "release/$armv7_name")
          universal_size=$(stat -c '%s' "release/$universal_name")
          aapt="${ANDROID_SDK_ROOT}/build-tools/35.0.0/aapt"
          arm64_version_code=$("$aapt" dump badging "release/$arm64_name" | sed -n "s/.*versionCode='\\([0-9]*\\)'.*/\\1/p")
          armv7_version_code=$("$aapt" dump badging "release/$armv7_name" | sed -n "s/.*versionCode='\\([0-9]*\\)'.*/\\1/p")
          universal_version_code=$("$aapt" dump badging "release/$universal_name" | sed -n "s/.*versionCode='\\([0-9]*\\)'.*/\\1/p")

          if [ -z "$arm64_version_code" ] || [ -z "$armv7_version_code" ] || [ -z "$universal_version_code" ]; then
            echo "::error::Unable to read versionCode from one or more release APKs"
            exit 1
          fi

          previous_tag=$(git describe --tags --abbrev=0 "${GITHUB_SHA}^" 2>/dev/null || true)
          if [ -n "$previous_tag" ]; then
            changelog=$(git log --pretty=format:'- %s' "${previous_tag}..${GITHUB_SHA}")
          else
            changelog=$(git log -n 20 --pretty=format:'- %s' "${GITHUB_SHA}")
          fi

          jq -n \
            --arg version_name "$version_name" \
            --arg changelog "$changelog" \
            --arg arm64_url "${release_base_url}/${arm64_name}" \
            --arg arm64_sha256 "$arm64_sha256" \
            --argjson arm64_size "$arm64_size" \
            --argjson arm64_version_code "$arm64_version_code" \
            --arg armv7_url "${release_base_url}/${armv7_name}" \
            --arg armv7_sha256 "$armv7_sha256" \
            --argjson armv7_size "$armv7_size" \
            --argjson armv7_version_code "$armv7_version_code" \
            --arg universal_url "${release_base_url}/${universal_name}" \
            --arg universal_sha256 "$universal_sha256" \
            --argjson universal_size "$universal_size" \
            --argjson universal_version_code "$universal_version_code" \
            '{
              schema: 1,
              version_name: $version_name,
              mandatory: false,
              changelog: $changelog,
              assets: {
                "arm64-v8a": {
                  version_code: $arm64_version_code,
                  url: $arm64_url,
                  sha256: $arm64_sha256,
                  size: $arm64_size
                },
                "armeabi-v7a": {
                  version_code: $armv7_version_code,
                  url: $armv7_url,
                  sha256: $armv7_sha256,
                  size: $armv7_size
                },
                universal: {
                  version_code: $universal_version_code,
                  url: $universal_url,
                  sha256: $universal_sha256,
                  size: $universal_size
                }
              }
            }' > release/update.json

          jq empty release/update.json
          sha256sum release/*.apk release/update.json > release/SHA256SUMS.txt

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: konkegram-release-${{ github.ref_name }}-${{ github.run_number }}
          path: release/
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          telegram_version_name=$(sed -n 's/^TELEGRAM_VERSION_NAME=//p' gradle.properties)
          release_notes=$(cat <<EOF
          **Upstream base:** Telegram for Android ${telegram_version_name}.

          ## APK downloads

          - **Universal**: recommended for most users; supports ARM64, ARMv7, x86 and x86_64.
          - **ARM64-v8a**: for most modern 64-bit Android phones and tablets.
          - **Armeabi-v7a**: for older 32-bit ARM devices.

          All APK variants require Android 5.0 or newer.
          EOF
          )

          gh release create "$GITHUB_REF_NAME" release/* \
            --verify-tag \
            --title "Konkegram ${GITHUB_REF_NAME#v}" \
            --notes "$release_notes" \
            --generate-notes
