name: Android Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build release APK and AAB
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      ORG_GRADLE_PROJECT_RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
      ORG_GRADLE_PROJECT_RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
      ORG_GRADLE_PROJECT_RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
      ORG_GRADLE_PROJECT_RELEASE_STORE_FILE: ../TMessagesProj/config/konkegram-release.keystore

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android build tools
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;27.2.12479018" "cmake;3.22.1"

      - name: Restore release credentials
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          for value in \
            RELEASE_KEYSTORE_BASE64 \
            GOOGLE_SERVICES_JSON_BASE64 \
            ORG_GRADLE_PROJECT_RELEASE_STORE_PASSWORD \
            ORG_GRADLE_PROJECT_RELEASE_KEY_ALIAS \
            ORG_GRADLE_PROJECT_RELEASE_KEY_PASSWORD; do
            if [ -z "${!value}" ]; then
              echo "::error::Required repository secret is missing: ${value#ORG_GRADLE_PROJECT_}"
              exit 1
            fi
          done

          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > TMessagesProj/config/konkegram-release.keystore
          printf '%s' "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > TMessagesProj/google-services.json
          cp TMessagesProj/google-services.json TMessagesProj_App/google-services.json

      - name: Build signed release
        run: |
          chmod +x gradlew
          ./gradlew \
            :TMessagesProj_App:assembleAfatRelease \
            :TMessagesProj_App:bundleAfatRelease \
            --stacktrace \
            --no-daemon

      - name: Prepare release files
        shell: bash
        run: |
          apk_path=$(find TMessagesProj_App/build/outputs/apk -type f -name '*.apk' -print -quit)
          aab_path=$(find TMessagesProj_App/build/outputs/bundle -type f -name '*.aab' -print -quit)

          if [ -z "$apk_path" ] || [ -z "$aab_path" ]; then
            echo "::error::Release APK or AAB was not produced"
            exit 1
          fi

          build_label=${GITHUB_REF_NAME//\//-}
          mkdir -p release
          cp "$apk_path" "release/Konkegram-${build_label}.apk"
          cp "$aab_path" "release/Konkegram-${build_label}.aab"
          sha256sum release/*.apk release/*.aab > release/SHA256SUMS.txt

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: Konkegram-${{ github.ref_name }}-${{ github.run_number }}
          path: release/
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" release/* \
            --verify-tag \
            --title "Konkegram $GITHUB_REF_NAME" \
            --generate-notes
