name: Android Beta

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: Optional beta changelog
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: android-beta
  cancel-in-progress: false

jobs:
  beta:
    name: Build beta APK
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      ORG_GRADLE_PROJECT_RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
      ORG_GRADLE_PROJECT_RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
      ORG_GRADLE_PROJECT_RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
      ORG_GRADLE_PROJECT_RELEASE_STORE_FILE: ../TMessagesProj/config/konkegram-release.keystore
      NATIVE_COMPILER_LAUNCHER: ccache
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_COMPILERCHECK: string:android-ndk-27.2.12479018
      CCACHE_MAXSIZE: 4G
      CCACHE_COMPRESS: "true"
      CCACHE_COMPRESSLEVEL: "1"

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic
          cache-read-only: ${{ github.ref != format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android build tools
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;27.2.12479018" "cmake;3.22.1"

      - name: Install native compiler cache
        run: |
          if ! command -v ccache >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install --yes ccache
          fi
          ccache --version

      - name: Restore native compiler cache
        id: ccache-restore
        uses: actions/cache/restore@v4
        with:
          path: .ccache
          key: ccache-v1-${{ runner.os }}-ndk-27.2.12479018-cmake-3.22.1-${{ github.sha }}
          restore-keys: |
            ccache-v1-${{ runner.os }}-ndk-27.2.12479018-cmake-3.22.1-

      - name: Configure native compiler cache
        run: |
          ccache --set-config=max_size="$CCACHE_MAXSIZE"
          ccache --set-config=compression=true
          ccache --set-config=compression_level="$CCACHE_COMPRESSLEVEL"
          ccache --zero-stats
          ccache --show-config

      - name: Restore beta credentials
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          for value in \
            RELEASE_KEYSTORE_BASE64 \
            GOOGLE_SERVICES_JSON_BASE64 \
            ORG_GRADLE_PROJECT_RELEASE_STORE_PASSWORD \
            ORG_GRADLE_PROJECT_RELEASE_KEY_ALIAS \
            ORG_GRADLE_PROJECT_RELEASE_KEY_PASSWORD; do
            if [ -z "${!value}" ]; then
              echo "::error::Required repository secret is missing: ${value#ORG_GRADLE_PROJECT_}"
              exit 1
            fi
          done

          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > TMessagesProj/config/konkegram-release.keystore
          printf '%s' "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > TMessagesProj/google-services.json
          cp TMessagesProj/google-services.json TMessagesProj_AppHockeyApp/google-services.json

      - name: Build signed beta
        env:
          BETA_RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          base_version_name=$(sed -n 's/^APP_VERSION_NAME=//p' gradle.properties)
          beta_version_name="${base_version_name}-beta.${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
          beta_version_code=$(date -u +%s)

          chmod +x gradlew
          ./gradlew \
            :TMessagesProj_AppHockeyApp:assembleAfatHA_private \
            -PAPP_VERSION_NAME="$beta_version_name" \
            -PBETA_VERSION_CODE="$beta_version_code" \
            --stacktrace \
            --build-cache \
            --no-daemon

          printf '%s' "$beta_version_name" > beta-version-name.txt

      - name: Report native compiler cache
        if: always()
        run: ccache --show-stats

      - name: Save native compiler cache
        if: success() && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && steps.ccache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .ccache
          key: ccache-v1-${{ runner.os }}-ndk-27.2.12479018-cmake-3.22.1-${{ github.sha }}

      - name: Prepare beta files
        shell: bash
        env:
          BETA_RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          beta_version_name=$(cat beta-version-name.txt)
          beta_apk=$(find TMessagesProj_AppHockeyApp/build/outputs/apk -type f -name '*.apk' -print -quit)
          if [ -z "$beta_apk" ]; then
            echo "::error::Beta APK was not produced"
            exit 1
          fi

          mkdir -p beta-release
          apk_name="konkegram-v${beta_version_name}-universal.apk"
          cp "$beta_apk" "beta-release/$apk_name"
          printf '%s' "$apk_name" > beta-apk-name.txt

          apk_sha256=$(sha256sum "beta-release/$apk_name" | cut -d ' ' -f 1)
          apk_size=$(stat -c '%s' "beta-release/$apk_name")
          aapt="${ANDROID_SDK_ROOT}/build-tools/35.0.0/aapt"
          apk_version_code=$("$aapt" dump badging "beta-release/$apk_name" | sed -n "s/.*versionCode='\\([0-9]*\\)'.*/\\1/p")
          if [ -z "$apk_version_code" ]; then
            echo "::error::Unable to read versionCode from beta APK"
            exit 1
          fi

          changelog="$BETA_RELEASE_NOTES"
          if [ -z "$changelog" ]; then
            previous_tag=$(git describe --tags --abbrev=0 2>/dev/null || true)
            if [ -n "$previous_tag" ]; then
              changelog=$(git log -n 20 --pretty=format:'- %s' "${previous_tag}..${GITHUB_SHA}")
            else
              changelog=$(git log -n 20 --pretty=format:'- %s' "${GITHUB_SHA}")
            fi
          fi

          jq -n \
            --arg version_name "$beta_version_name" \
            --arg changelog "$changelog" \
            --arg url "https://github.com/${GITHUB_REPOSITORY}/releases/download/beta/${apk_name}" \
            --arg sha256 "$apk_sha256" \
            --argjson size "$apk_size" \
            --argjson version_code "$apk_version_code" \
            '{
              schema: 1,
              version_name: $version_name,
              mandatory: false,
              changelog: $changelog,
              assets: {
                universal: {
                  version_code: $version_code,
                  url: $url,
                  sha256: $sha256,
                  size: $size
                }
              }
            }' > beta-release/update-beta.json

          jq empty beta-release/update-beta.json
          sha256sum beta-release/*.apk beta-release/update-beta.json > beta-release/SHA256SUMS-beta.txt

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: konkegram-beta-${{ github.run_number }}-${{ github.run_attempt }}
          path: beta-release/
          if-no-files-found: error
          retention-days: 30

      - name: Publish beta channel
        env:
          GH_TOKEN: ${{ github.token }}
          BETA_RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          beta_version_name=$(cat beta-version-name.txt)
          apk_name=$(cat beta-apk-name.txt)
          release_notes=$(cat <<EOF
          ## Konkegram Beta ${beta_version_name}

          This prerelease is intended for testing before the next stable release.

          - Package: \`org.konkegram.messenger.beta\`
          - APK: Universal (ARM64, ARMv7, x86 and x86_64)
          - Minimum Android version: 5.0
          EOF
          )
          if [ -n "$BETA_RELEASE_NOTES" ]; then
            release_notes="${release_notes}

          ## Changes

          ${BETA_RELEASE_NOTES}"
          fi

          if gh release view beta >/dev/null 2>&1; then
            gh release upload beta "beta-release/$apk_name"
            gh release upload beta beta-release/update-beta.json beta-release/SHA256SUMS-beta.txt --clobber
            gh release edit beta \
              --title "Konkegram Beta ${beta_version_name}" \
              --notes "$release_notes" \
              --prerelease
            gh release view beta --json assets --jq '.assets[].name' | while read -r asset; do
              if [[ "$asset" == konkegram-v*-universal.apk && "$asset" != "$apk_name" ]]; then
                gh release delete-asset beta "$asset" --yes
              fi
            done
          else
            gh release create beta beta-release/* \
              --target "$GITHUB_SHA" \
              --title "Konkegram Beta ${beta_version_name}" \
              --notes "$release_notes" \
              --prerelease
          fi
